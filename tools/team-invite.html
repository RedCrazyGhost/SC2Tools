    <section class="card team-invite-panel">
      <header class="team-invite-panel-head">
        <h2 data-i18n="teamInvite.title">合作组队匹配</h2>
        <p id="teamInviteIntro" class="team-invite-lead"></p>
      </header>
      <div class="team-invite-panel-toolbar">
        <div class="team-invite-toolbar-row">
          <button type="button" id="openInviteModal" class="team-invite-toolbar-btn btn-team-invite-primary">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            <span data-i18n="teamInvite.create">发起邀请</span>
          </button>
          <button type="button" id="refreshBtn" class="team-invite-toolbar-btn team-invite-toolbar-btn--secondary">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08a5.99 5.99 0 0 1-5.65 4c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35Z"/>
            </svg>
            <span data-i18n="teamInvite.refresh">刷新列表</span>
          </button>
        </div>
        <p id="statusLine" class="team-invite-page-status" aria-live="polite"></p>
      </div>
      <div class="team-invite-panel-body">
        <div id="inviteList" class="team-invite-list" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <div id="inviteModal" class="team-invite-modal" hidden>
    <div class="team-invite-modal-backdrop" data-close-invite-modal tabindex="-1"></div>
    <div
      class="team-invite-modal-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="inviteModalTitle"
    >
      <header class="team-invite-modal-header">
        <h3 id="inviteModalTitle" data-i18n="teamInvite.modalTitle">发起邀请</h3>
        <button
          type="button"
          class="team-invite-modal-close"
          data-close-invite-modal
          data-i18n-aria-label="aria.closeInviteModal"
          aria-label="关闭"
        >&times;</button>
      </header>
      <p id="modalStatusLine" class="team-invite-modal-status" aria-live="polite"></p>
      <div id="inviteModalFormWrap">
        <p class="team-invite-modal-hint" data-i18n="teamInvite.modalHint">填写后提交即可生成分享链接与二维码。</p>
        <form id="inviteModalForm" class="form-grid team-invite-modal-form" onsubmit="return false;">
        <label>
          <span data-i18n="teamInvite.inviteTitleLabel">邀请标题</span>
          <input id="inviteTitle" name="inviteTitle" maxlength="80" data-i18n-placeholder="teamInvite.inviteTitlePlaceholder" placeholder="例如：周末突变组队">
          <span class="team-invite-field-hint" data-i18n="teamInvite.inviteTitleHint">1～80 字，将显示在邀请卡片与公开页顶部。</span>
        </label>
        <label>
          <span data-i18n="teamInvite.blizzardId">暴雪战网 ID</span>
          <input id="blizzardId" name="blizzardId" maxlength="18" autocomplete="username" data-i18n-placeholder="teamInvite.blizzardIdPlaceholder" placeholder="示例：PlayerName#1234">
        </label>
        <label>
          <span data-i18n="teamInvite.note">说明（可选）</span>
          <textarea id="note" name="note" rows="2" maxlength="250" aria-describedby="noteHint"></textarea>
          <span id="noteHint" class="team-invite-field-hint" data-i18n="teamInvite.noteHint">最多 250 字。</span>
        </label>
        <label class="team-invite-span-full">
          <span data-i18n="teamInvite.expiresAtLabel">截止时间</span>
          <input id="inviteExpiresAt" name="inviteExpiresAt" type="datetime-local" step="60" aria-describedby="inviteExpiresAtHint">
          <span id="inviteExpiresAtHint" class="team-invite-field-hint" data-i18n="teamInvite.expiresAtHint">须为未来时间，最多 30 天内（默认 3 天后）。到期后邀请将从服务器删除，链接失效。</span>
        </label>
        <div class="team-invite-span-full team-invite-calendar-option">
          <label class="team-invite-inline-checkbox">
            <input type="checkbox" id="includeInvitePoster" name="includeInvitePoster" value="protoss-want-you" />
            <span data-i18n="teamInvite.includePoster">使用 Protoss 招募海报</span>
          </label>
          <p class="team-invite-field-hint" data-i18n="teamInvite.includePosterHint">开启后，分享页顶部会显示招募风格海报图。</p>
        </div>
        <div class="team-invite-modal-actions">
          <button type="button" id="modalCancelBtn" data-i18n="common.cancel">取消</button>
          <button type="button" id="modalSubmitInvite" class="btn-team-invite-primary" data-i18n="teamInvite.modalSubmit">确定</button>
        </div>
        </form>
      </div>
      <div id="inviteModalResult" class="team-invite-modal-result" hidden>
        <p><strong data-i18n="teamInvite.shortUrl">分享链接</strong>：<a id="resultLink" href="#" rel="noopener noreferrer" target="_blank"></a></p>
        <p><strong data-i18n="teamInvite.qr">二维码</strong></p>
        <div id="qrWrap"></div>
        <p id="resultExpiresLine" hidden><strong data-i18n="teamInvite.resultExpires">有效期至：</strong><span id="resultExpiresValue"></span></p>
        <div class="team-invite-modal-actions">
          <button type="button" id="modalDoneBtn" class="btn-team-invite-primary" data-i18n="teamInvite.modalDone">完成</button>
        </div>
      </div>
    </div>
