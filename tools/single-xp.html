  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="head.single.title">单局游戏经验计算 - 星际争霸2工具站</title>
  <meta name="description" content="星际争霸2合作模式单局游戏经验计算：按固定基础经验、奖励目标经验、难度加成、随机加成与首胜规则计算每局经验。" data-i18n-content="head.single.description">
  <link rel="canonical" href="https://example.com/tools/single-xp.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="单局游戏经验计算" data-i18n-content="head.single.ogTitle">
  <meta property="og:description" content="按公开官方规则估算单局合作经验。" data-i18n-content="head.single.ogDescription">
  <meta property="og:url" content="https://example.com/tools/single-xp.html">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo"><a href="../index.html" data-i18n="site.name">星际争霸2工具站</a></h1>
      <div class="header-actions">
        <nav aria-label="主导航" data-i18n-aria-label="aria.mainNav">
          <ul class="nav-list">
            <li><a href="./single-xp.html" aria-current="page" data-i18n="nav.single">单局经验计算器</a></li>
            <li><a href="./coop-xp.html" data-i18n="nav.coop">合作练级日历</a></li>
          </ul>
        </nav>
        <div class="lang-switcher" aria-label="language switcher" data-i18n-aria-label="aria.languageSwitcher">
          <label for="lang-select-single" data-i18n="lang.switcher.label">语言</label>
          <select id="lang-select-single" data-lang-select>
            <option value="zh" data-i18n="lang.zh">中文</option>
            <option value="en" data-i18n="lang.en">EN</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="breadcrumb" aria-label="面包屑" data-i18n-aria-label="aria.breadcrumb">
      <a href="../index.html" data-i18n="common.home">首页</a> / <span data-i18n="single.breadcrumb">单局经验</span>
    </nav>

    <section>
      <h2 data-i18n="single.title">单局游戏经验</h2>
      <form id="xp-form" class="form-grid">
        <label>
          <span data-i18n="single.form.taskType">任务类型</span>
          <select name="taskType" required>
            <option value="normal" data-i18n="single.option.normalTask">普通任务</option>
            <option value="mutation" data-i18n="single.option.mutationTask">突变任务</option>
          </select>
        </label>
        <label>
          <span data-i18n="single.form.difficulty">难度</span>
          <select name="difficulty" required>
            <option value="casual" data-i18n="difficulty.casual">休闲</option>
            <option value="normal" data-i18n="difficulty.normal">普通</option>
            <option value="hard" data-i18n="difficulty.hard">困难</option>
            <option value="brutal" data-i18n="difficulty.brutal">残酷</option>
            <option value="brutal1" data-i18n="difficulty.brutal1">残酷+1</option>
            <option value="brutal2" data-i18n="difficulty.brutal2">残酷+2</option>
            <option value="brutal3" data-i18n="difficulty.brutal3">残酷+3</option>
            <option value="brutal4" data-i18n="difficulty.brutal4">残酷+4</option>
            <option value="brutal5" data-i18n="difficulty.brutal5">残酷+5</option>
            <option value="brutal6" data-i18n="difficulty.brutal6">残酷+6</option>
          </select>
        </label>
        <label class="checkbox">
          <input name="randomMapBonus" type="checkbox">
          <span data-i18n="single.form.randomMap">随机地图（+25%）</span>
        </label>
        <label class="checkbox">
          <input name="firstWinBonus" type="checkbox">
          <span id="first-win-bonus-label" data-i18n="single.firstwin.daily">每日首胜</span>
        </label>
      </form>
    </section>

    <section aria-live="polite">
      <h2 data-i18n="single.result.title">计算结果</h2>
      <div id="xp-result" class="card"></div>
    </section>

    <section>
      <h2 data-i18n="single.formula.title">公式说明</h2>
      <p data-i18n="single.formula.line1">每局游戏经验 = (基础经验 + 奖励目标经验) × (1 + 难度加成 + 随机加成) + 首胜经验 + （每周第一次完成时的累积难度奖励）</p>
      <p data-i18n="single.formula.line2">基础经验：20000 xp（固定） | 奖励目标经验：2000 xp（固定） | 随机加成：随机地图时25% | 首胜经验：10000 xp</p>
      <p data-i18n="single.quicklinks">经验列表速查：</p>
      <ul>
        <li><a href="./commander-xp-table.html" data-i18n="index.card.commander.title">指挥官1-15级经验列表</a></li>
        <li><a href="./mastery-xp-table.html" data-i18n="index.card.mastery.title">精通0-90级经验列表</a></li>
        <li><a href="./mutation-reward-table.html" data-i18n="index.card.mutation.title">每周突变奖励经验列表</a></li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p data-i18n="site.footer">© 2026 星际争霸2工具站</p>
    </div>
  </footer>

  <script defer src="../assets/js/single-xp.js"></script>
</body>
</html>
